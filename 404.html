<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        .error-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
            position: relative;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }

        .error-container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 0, 110, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }

        .error-content {
            z-index: 1;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: 120px;
            color: #ff006e;
            font-weight: bold;
            text-shadow: 0 0 20px #ff006e, 0 0 40px #ff006e;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 36px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .error-description {
            font-size: 18px;
            color: #00d4ff;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #00ff88;
            background: transparent;
            color: #00ff88;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-shadow: 0 0 10px #00ff88;
            box-shadow: 0 0 15px #00ff88;
        }

        .btn:hover {
            background: #00ff88;
            color: #0a0e27;
            transform: scale(1.05);
            box-shadow: 0 0 25px #00ff88;
            text-shadow: none;
        }

        .btn-secondary {
            border-color: #ff006e;
            color: #ff006e;
            text-shadow: 0 0 10px #ff006e;
            box-shadow: 0 0 15px #ff006e;
        }

        .btn-secondary:hover {
            background: #ff006e;
            color: #0a0e27;
            box-shadow: 0 0 25px #ff006e;
        }

        .timer {
            margin-top: 30px;
            font-size: 14px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 28px;
            }

            .error-description {
                font-size: 16px;
            }

            .button-group {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">¡Página No Encontrada!</h1>
            <p class="error-description">
                Lo sentimos, la página que buscas no existe. 
                Pero no te preocupes, aquí hay algunas opciones:
            </p>
            
            <div class="button-group">
                <a href="/" class="btn">← Ir al Inicio</a>
                <a href="/app" class="btn btn-secondary">Ver Proyectos →</a>
            </div>

            <div class="timer">
                Serás redirigido al inicio en <span id="countdown">10</span> segundos...
            </div>
        </div>
    </div>

    <script>
        // Redirección automática
        let segundos = 10;
        const countdownElement = document.getElementById('countdown');

        const intervalo = setInterval(() => {
            segundos--;
            countdownElement.textContent = segundos;

            if (segundos === 0) {
                clearInterval(intervalo);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rony - Portafolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* Menú Hamburguesa */
        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: transparent;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        .menu-toggle span {
            width: 30px;
            height: 3px;
            background: #00ff88;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #00ff88;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Menú Lateral */
        .menu-lateral {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            border-right: 2px solid #00ff88;
            box-shadow: 0 0 30px #00ff88;
            transition: left 0.3s ease;
            z-index: 999;
            padding-top: 80px;
        }

        .menu-lateral.active {
            left: 0;
        }

        .menu-lateral ul {
            list-style: none;
        }

        .menu-lateral ul li {
            padding: 20px 30px;
            border-bottom: 1px solid #00ff88;
        }

        .menu-lateral ul li a {
            color: #00ff88;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px #00ff88;
            cursor: pointer;
        }

        .menu-lateral ul li a:hover {
            color: #ff006e;
            text-shadow: 0 0 20px #ff006e;
            font-size: 20px;
        }

        /* Contenedor Principal */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }

        /* Contenido */
        .content {
            text-align: center;
            z-index: 1;
        }

        .neon-text {
            font-size: 72px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 30px #00ff88, 0 0 40px #00ff88;
            letter-spacing: 3px;
            animation: neon-flicker 3s infinite;
            font-weight: bold;
        }

        @keyframes neon-flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 30px #00ff88, 0 0 40px #00ff88;
            }
            20%, 24%, 55% {
                text-shadow: 0 0 5px #00ff88;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .neon-text {
                font-size: 48px;
            }

            .menu-lateral {
                width: 100%;
                left: -100%;
            }

            .menu-lateral.active {
                left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Menú Hamburguesa -->
    <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Menú Lateral -->
    <nav class="menu-lateral" id="menuLateral">
        <ul>
            <li><a href="/">Inicio</a></li>
            <li><a href="/app">Proyectos</a></li>
        </ul>
    </nav>

    <!-- Página de Inicio -->
    <div class="container">
        <div class="content">
            <h1 class="neon-text">Hola Soy Rony</h1>
        </div>
    </div>

    <script>
        // Obtener elementos
        const menuToggle = document.getElementById('menuToggle');
        const menuLateral = document.getElementById('menuLateral');

        // Toggle del menú
        menuToggle.addEventListener('click', function() {
            menuToggle.classList.toggle('active');
            menuLateral.classList.toggle('active');
        });

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', function(event) {
            const isClickInsideMenu = menuLateral.contains(event.target);
            const isClickOnToggle = menuToggle.contains(event.target);
            
            if (!isClickInsideMenu && !isClickOnToggle && menuLateral.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuLateral.classList.remove('active');
            }
        });
    </script>
</body>
</html>
